apiVersion: appdarta.io/v1
kind: DataTankSpec
metadata:
    canonical-model-ref: specs/models/canonical/sample.canonical.yaml
    description: enterprise shared registry tank for vertical-template
    domain: sample
    name: enterprise-common-registry
    owner: vertical-template
    version: 0.1.0
spec:
    backing-profile: local-embedded
    connection-ref: local://embedded
    data-model: document
    freshness:
        default: 24h
    jobs:
        bootstrap:
            parallelism: 1
            priority: normal
        health-check:
            freshness-sla:
                primary: 24h
            interval: 10m
        purge:
            schedule: 0 3 * * *
            strategy: ttl-and-superseded
        reindex:
            trigger: manual
        scheduled:
            max-concurrent: 1
    limits:
        max-chunks: 100000
        max-size-gb: 5
    marketplace:
        includes-partitions: []
        pack-version: 0.1.0
        publishable: false
        tier: free
    partitions:
        - access: private
          description: registry shared partition
          encryption: client-key
          freshness: 24h
          name: primary
          sources:
            - mode: push
              name: enterprise-common-registry-source
              type: document-upload
    processing:
        chunking:
            chunk-size: 512
            overlap: 64
            strategy: semantic
        deduplication:
            enabled: true
        embedding:
            model: sentence-transformers/all-MiniLM-L6-v2
        validation:
            canonical-model: specs/models/canonical/sample.canonical.yaml
    purpose: registry
    reuse-policy: reuse-first
    sharing-scope: enterprise
    tank-type: util
