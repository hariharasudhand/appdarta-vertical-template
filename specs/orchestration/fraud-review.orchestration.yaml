apiVersion: appdarta.io/v1
kind: OrchestrationSpec
metadata:
  name: finance-review-gateway
  version: 2.0.0
  plane: runtime
  description: |
    Reference orchestration for finance fraud review.
    Demonstrates: async handlers, continue-on-error, max-hops, multi-agent-policies
    (validator + critique + consensus). Copy and adapt for your vertical.
spec:
  trigger:
    type: ui-call
  mode: sync
  max-hops: 3
  concurrency:
    max_concurrent_agents: 500
    agent_timeout_ms: 5000
    backpressure: queue
    scale_policy: per_tenant

  target:
    kind: agent
    ref: fraud-detection-agent@1.0.0
    mode: sync
    policy-ref: specs/policies/finance-escalation-policy.yaml
    timeout: 45s

  pipelines:
    - type: in
      handlers:
        - ref: auth-handler
          mode: sync
          async: false
          continue-on-error: false      # hard gate — abort if auth fails

        - ref: tank-enrichment-handler
          mode: sync
          async: true                   # context enrichment fires in background
          continue-on-error: true       # enrichment failure never blocks the request

    - type: out
      handlers:
        - ref: result-validator-handler
          mode: sync
          async: false
          continue-on-error: false      # validation must pass synchronously

        - ref: audit-log-handler
          mode: async
          async: true                   # audit log is always fire-and-forget
          continue-on-error: true

  # Multi-agent policies are evaluated after the target invocation.
  # Edit here or via the UI, then run: darta policy sync --domain finance
  multi-agent-policies:
    # Compliance validator checks the fraud agent's decision before it proceeds.
    - type: validator
      agent-ref: fraud-review-agent@1.0.0
      trigger-on: always
      fail-action: block

    # Self-critique when the agent signals low confidence.
    - type: critique
      agent-ref: self
      trigger-on: on-metadata
      metadata-key: confidence_score
      match-value: "low"
      fail-action: retry
      max-retries: 1

    # Consensus: two senior reviewers must agree before escalating high-value cases.
    - type: consensus
      trigger-on: on-metadata
      metadata-key: amount_usd
      match-value: "50000"
      quorum-of:
        - fraud-review-agent@1.0.0
        - fraud-evidence-agent@1.0.0
      threshold: 2
      fail-action: escalate

  observability:
    emit-trace: true
    emit-metrics: true
    capture-input-pipeline: true
    capture-output-pipeline: true
